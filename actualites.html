<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Actualités — eDéclaration × Démat-Facile</title>
<meta name="description" content="Actualités et guides sur les formalités d'entreprises, le Guichet Unique et le RNE.">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Plus Jakarta Sans",sans-serif;background:#F7F9FF;color:#2C3356;line-height:1.7;}
.hero{background:linear-gradient(135deg,#0E1A3A,#1840B0);padding:64px 2rem 56px;text-align:center;}
.hero h1{font-size:clamp(28px,4vw,46px);font-weight:800;color:white;letter-spacing:-1.2px;margin-bottom:12px;}
.hero h1 span{color:#F5A623;}
.hero p{font-size:16px;color:rgba(255,255,255,0.7);max-width:560px;margin:0 auto;}
.main{max-width:860px;margin:0 auto;padding:48px 2rem 80px;}
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:32px;}
.fb{background:white;border:0.5px solid #DDE4F5;border-radius:100px;padding:7px 16px;font-family:inherit;font-size:12.5px;font-weight:600;color:#6B7399;cursor:pointer;transition:all 0.15s;}
.fb.active,.fb:hover{background:#1840B0;color:white;border-color:#1840B0;}
article.hidden{display:none;}
</style>
</head>
<body>
<div class="hero"><h1>Actualités &amp; <span>ressources</span></h1><p>Guides pratiques et actualités sur les formalités d'entreprises, le Guichet Unique et le RNE.</p></div>
<div class="main"><div class="filters" id="f"><button class="fb active" onclick="filt(this,'all')">Tous les articles</button></div><div id="a"><div style="text-align:center;padding:56px 32px;color:#6B7399;"><div style="font-size:48px;margin-bottom:14px;">📰</div><h3 style="font-size:17px;font-weight:800;color:#0E1A3A;margin-bottom:8px;">Aucun article pour le moment</h3><p>Revenez bientôt.</p></div></div></div>
<script>function filt(b,c){document.querySelectorAll(".fb").forEach(function(x){x.classList.remove("active");});b.classList.add("active");document.querySelectorAll("#a article").forEach(function(a){a.classList.toggle("hidden",c!=="all"&&a.dataset.cat!==c);});}</script>
</body>
</html>
